<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>templates/post/list.html</title>
</head>
<body>
    <div class="container">
        <a href="/post/new">새 글 작성</a>
        <h3>글 목록 입니다</h3>
        <table border="1">
            <thead>
                <tr>
                    <th>번호</th>
                    <th>작성자</th>
                    <th>제목</th>
                    <th>내용</th>
                    <th>작성일</th>
                    <th>수정</th>
                    <th>삭제</th>
                </tr>
            </thead>
            <tbody>
                {% for post in posts %}
                <tr>
                    <td>{{ post.num }}</td>
                    <td>{{ post.writer }}</td>
                    <td>{{ post.title }}</td>
                    <td>{{ post.content }}</td>
                    <td>{{ post.created_at }}</td>
                    <td>
                        <a href="/post/edit/{{ post.num }}">수정</a>
                    </td>
                    <td>
                        <button onclick="deletePost({{ post.num }})">삭제</button>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script>
        async function deletePost(num) {
            if (!confirm(num + "번 포스트를 삭제하시겠습니까?")) return;

            try {
                const response = await fetch(`/post/delete/${num}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert("삭제되었습니다.");
                    location.reload(); // 삭제 후 목록 새로고침
                } else {
                    alert("삭제 실패!");
                }
            } catch (error) {
                console.error("Error:", error);
                alert("오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
