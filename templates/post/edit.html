<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>templates/post/edit.html</title>
</head>
<body>
    <div class="container">
        <h3>글 수정 양식</h3>
        <form action="/post/edit/{{ post.num }}" method="post">
            <label>
                작성자 <input type="text" name="writer" value="{{post.writer}}" readonly>
            </label>
            <br>
            <label>
                제목 <input type="text" name="title" value="{{post.title}}">
            </label>
            <br>
            <label>
                내용 <br>
                <textarea name="content">{{post.content}}</textarea>
            </label>
            <br>
            <button type="submit">수정</button>
            <button type="reset">취소</button>
        </form>
    </div>
</body>
</html>
